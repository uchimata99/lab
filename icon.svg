<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="המעבדה">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#1c1432"/><stop offset="55%" stop-color="#15111e"/><stop offset="100%" stop-color="#0d0915"/>
    </radialGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fd9c6"/><stop offset="52%" stop-color="#6ba0ff"/><stop offset="100%" stop-color="#c08bff"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".95"/><stop offset="100%" stop-color="#dccfea" stop-opacity=".75"/>
    </linearGradient>
    <radialGradient id="elec" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7e8"/><stop offset="40%" stop-color="#ffb454"/><stop offset="100%" stop-color="#ff9a3c"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="34"/></filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="eglow" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="6"/></filter>
    <clipPath id="inner"><path d="M226,201 L286,201 L356,360 Q360,372 348,373 L164,373 Q152,372 156,360 Z"/></clipPath>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
